hazard_journal_1:
  title: "残破的实验日志"
  raw_text: "实验记录：第42天。我那一整瓶珍贵的《狐之狡诈》药水被一只训练无人机喝掉了！它开始用通用语纠正我的法术发音。我把它锁在主控室。为防止狂暴训练无人机破坏溶剂，我在走廊布下毒气。通行密语是：控制阀口令 (Control Valve Phrase)。"

hazard_diary_1:
  title: "沾满血污的日记本"
  raw_text: "实验记录第 42 天：我终于把那只叫 Gatekeeper 的蠢训练无人机和毒气陷阱连接起来了。只要通道的毒气触发，他就会警觉。那把沉重的铁钥匙，我安全地锁在了密室的箱子里。希望那些愚蠢的寻宝者会被毒气融化。"

hazard_chemical_notes:
  title: "化学残页"
  raw_text: "药剂批注：死亡萃取物可以稳定毒气云，但会削弱服用者意志。若与危害催化剂混合，受试者会在恐惧和服从之间摇摆。"

hazard_iron_key_sketch:
  title: "重铁钥匙草图"
  raw_text: "草图标注：重铁钥匙由 Gatekeeper 保管。钥匙路线穿过毒气走廊，备用提示留在书房箱与账本夹层。"
