name: checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BAILIAN_API_KEY: "dummy"
      DASHSCOPE_API_BASE: "https://example.invalid"
      MODEL_NAME: "dummy-model"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Disable optional chroma backend for deterministic CI
        run: |
          pip uninstall -y chromadb chroma-hnswlib || true

      - name: Run unit tests
        run: pytest -q

      - name: Run golden eval suite
        run: python -m core.eval.runner --suite golden

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Run web UI tests
        run: |
          npm ci
          npm test

      - name: Upload eval artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: artifacts/evals/
          if-no-files-found: ignore
