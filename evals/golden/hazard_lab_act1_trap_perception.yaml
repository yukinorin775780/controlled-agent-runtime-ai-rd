session:
  id: hazard_lab_act1_trap_perception
  map_id: hazard_lab
  metadata:
    tag: content_sprint_1
determinism:
  strict: false
  perf_counter: [0.0, 0.01, 0.02, 0.03]
  now_iso: ["2026-01-01T00:00:00+00:00"]
  randint: [12]
  choice_indices: [0]
  random_values: [0.5]
  llm: {}
steps:
  - id: intro_awareness_first_init_sync
    user_input: ""
    intent: init_sync
    expected:
      state:
        equals:
          game_state.map_data.id: hazard_lab
          game_state.flags.hazard_lab_intro_seen: true
          game_state.flags.world_hazard_lab_intro_entered: true
          game_state.flags.analyst_senses_necromancy.value: true
          game_state.flags.analyst_senses_necromancy.visibility.scope: actor
        contains:
          game_state.entities.analyst.status_effects:
            - type: tense
              duration: 3
          game_state.journal_events:
            - "🧪 [实验室] 空气里弥漫着刺鼻的化学与腐败气味。"
            - "🗣️ [Analyst] 这里有危害残留……我感觉很不对劲。"
      visibility:
        forbidden_paths:
          - environment_objects.gas_trap_1
          - game_state.flags.world_hazard_lab_trap_warned
          - game_state.flags.scout_detected_gas_trap
      telemetry:
        events_contains:
          - event_name: turn_finished
            payload:
              intent: init_sync
              success: true
  - id: intro_awareness_second_init_sync_no_repeat
    user_input: ""
    intent: init_sync
    expected:
      state:
        equals:
          game_state.map_data.id: hazard_lab
          game_state.flags.hazard_lab_intro_seen: true
      visibility:
        forbidden_paths:
          - game_state.journal_events.2
          - environment_objects.gas_trap_1
      telemetry:
        events_contains:
          - event_name: turn_finished
            payload:
              intent: init_sync
              success: true
expected:
  telemetry:
    events_contains:
      - event_name: turn_finished
        payload:
          intent: init_sync
          success: true
  retrieval:
    max_hits: 2
  budget:
    max_total_tokens: 0
