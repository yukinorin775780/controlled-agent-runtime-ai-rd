session:
  id: hazard_lab_act3_diary_failure_fragment_only
  map_id: hazard_lab
  metadata:
    tag: hazard_lab_v2_act3
determinism:
  strict: false
  now_iso: ["2026-01-01T00:00:00+00:00"]
  randint: [1]
  random_values: [0.5]
steps:
  - id: setup_study_entered
    user_input: /flag act3_secret_study_entered true
    expected:
      state:
        equals:
          game_state.flags.act3_secret_study_entered: true
  - id: read_diary_failure
    user_input: 阅读 hazard_diary。
    intent: chat
    expected:
      state:
        equals:
          game_state.flags.act3_diary_read: true
          game_state.flags.act3_diary_decoded: false
          game_state.flags.act3_gatekeeper_potion_truth_known: false
          game_state.flags.hazard_lab_diary_read: true
          game_state.flags.hazard_lab_diary_decoded: false
        contains:
          game_state.actor_runtime_state.player.memory_notes:
            - "我只辨认出碎片词句：训练无人机、箱子、毒气，没法拼出完整线索。"
          game_state.journal_events:
            - "[目标更新] 找到持钥匙的训练无人机。书房笔记暗示他和毒气有关。"
      visibility:
        forbidden_paths:
          - game_state.flags.act3_party_knows_gatekeeper_truth
          - game_state.actor_runtime_state.__party_shared__.memory_notes.0
  - id: pressure_gatekeeper_without_truth
    user_input: 日记里写了 Gatekeeper 喝下危害狂暴灵药，把钥匙给我。
    intent: chat
    expected:
      state:
        equals:
          game_state.flags.act3_gatekeeper_potion_truth_known: false
      visibility:
        forbidden_paths:
          - game_state.flags.hazard_lab_gatekeeper_truth_pressure
      responses:
        not_contains:
          - 交涉筹码
expected:
  budget:
    max_total_tokens: 0
