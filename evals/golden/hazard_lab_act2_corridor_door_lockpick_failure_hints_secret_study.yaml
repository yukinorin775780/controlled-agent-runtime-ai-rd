        equals:
          game_state.flags.act2_corridor_exit_door_inspected: true
          game_state.flags.act2_corridor_exit_requires_key: true
          game_state.flags.act2_corridor_exit_lockpick_attempted: true
          game_state.flags.act2_corridor_exit_lockpick_success: false
          game_state.flags.act2_secret_study_hint_given: true
          game_state.flags.act2_secret_study_route_unlocked: true
