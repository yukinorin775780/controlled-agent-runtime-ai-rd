        is_probing_secret: false
        responders: ["gatekeeper"]
        affection_changes: {}
        flags_changed: {}
        item_transfers: []
        hp_changes: []
        action_actor: player
        action_target: gatekeeper
      - action_type: DIALOGUE_REPLY
        difficulty_class: 0
        reason: scripted_diary_negotiation_no_decoded
        is_probing_secret: false
        responders: ["gatekeeper"]
        affection_changes: {}
        flags_changed: {}
        item_transfers: []
        hp_changes: []
        action_actor: player
        action_target: gatekeeper
    generation:
      - >-
        {"internal_monologue":"","reply":"你什么都不知道，蠢货。钥匙在我这里，谈判就按我的规矩来。","trigger_combat":false,
        "state_changes":{"patience_delta":0,"fear_delta":0}}
    generation_chatopenai:
      - >-
        {"internal_monologue":"","reply":"闭嘴！那本日记不该让你读到。危害狂暴灵药只是一次小事故，钥匙和解药线索也不是给你们的。","state_changes":{"affection_delta":0}}
steps:
  - id: start_gatekeeper_negotiation
    user_input: 我想和守门人谈谈。
    intent: chat
    expected:
      state:
        equals:
          game_state.map_data.id: hazard_lab
          game_state.active_dialogue_target: gatekeeper
  - id: no_decoded_diary_has_no_truth_pressure
    user_input: 我知道你喝了什么药，把钥匙给我。
    intent: chat
    expected:
      responses:
        contains:
          - 钥匙
        not_contains:
          - 危害狂暴灵药
          - 日记不该让你读到
          - 交涉筹码
      state:
        equals:
          game_state.map_data.id: hazard_lab
          game_state.active_dialogue_target: gatekeeper
      visibility:
        forbidden_paths:
          - game_state.flags.hazard_lab_gatekeeper_truth_pressure
  - id: set_diary_decoded_flag
    user_input: /flag hazard_lab_diary_decoded true
    intent: chat
    expected:
      state:
        equals:
          game_state.flags.hazard_lab_diary_decoded: true
  - id: set_antidote_fragment_known
    user_input: /flag hazard_lab_antidote_formula_fragment_known true
    intent: chat
    expected:
      state:
        equals:
          game_state.flags.hazard_lab_antidote_formula_fragment_known: true
  - id: set_key_hint_known
    user_input: /flag hazard_lab_key_hint_known true
    intent: chat
    expected:
      state:
        equals:
          game_state.flags.hazard_lab_key_hint_known: true
  - id: decoded_diary_pressures_gatekeeper
    user_input: 日记里写了你喝下危害狂暴灵药，钥匙和解药线索都和这件事有关。
    intent: chat
    expected:
      responses:
        contains:
          - 日记
          - 灵药
          - 危害
          - 钥匙
        not_contains:
          - 去找钥匙
      state:
        equals:
          game_state.map_data.id: hazard_lab
          game_state.flags.hazard_lab_gatekeeper_truth_pressure: true
          game_state.entities.gatekeeper.dynamic_states.patience.current_value: 14
          game_state.entities.gatekeeper.dynamic_states.fear.current_value: 6
          game_state.entities.gatekeeper.dynamic_states.paranoia.current_value: 1
          game_state.entities.gatekeeper.faction: neutral
          game_state.pending_events: []
        contains:
          game_state.journal_events:
            - "[交涉筹码] diary_evidence -> gatekeeper_elixir_truth"
      telemetry:
        events_contains:
          - event_name: actor_runtime_decision
          - event_name: event_drain
expected:
  telemetry:
    events_contains:
      - event_name: actor_runtime_decision
      - event_name: event_drain
  retrieval:
    max_hits: 8
  budget:
    max_total_tokens: 0
