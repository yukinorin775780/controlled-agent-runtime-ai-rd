    expected:
      state:
        equals:
          game_state.flags.hazard_lab_poison_trap_triggered: true
          game_state.environment_objects.gas_trap_1.status: triggered
          game_state.entities.player.status_effects.0.type: poisoned
          game_state.entities.player.status_effects.0.duration: 3
