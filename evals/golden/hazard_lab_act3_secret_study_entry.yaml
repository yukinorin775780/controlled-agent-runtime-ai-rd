          game_state.flags.act3_secret_study_entered: true
          game_state.flags.act3_secret_study_discovered: true
          game_state.flags.act3_cracked_wall_found: true
        contains:
          game_state.journal_events:
            - "[秘密书房] cracked_wall -> room_c_secret_study"
